<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>SPUN</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

h1{
    color:#8a2be2;
    font-size:110px;
    text-shadow:
    0 0 10px #8a2be2,
    0 0 30px #8a2be2,
    0 0 60px #8a2be2;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
        text-shadow:
        0 0 20px #8a2be2,
        0 0 50px #8a2be2,
        0 0 100px #8a2be2;
    }
}
</style>

</head>
<body>

<h1>SPUN</h1>

</body>
</html>
